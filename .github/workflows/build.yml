name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libibverbs-dev \
            librdmacm-dev \
            rdma-core \
            ibverbs-utils

      - name: build lib
        run: make -C lib

      - name: build pre-library examples
        run: |
          make -C examples/01-tcp-echo
          make -C examples/02-verbs-hello
          make -C examples/05-rdma-write

      - name: build library examples
        run: |
          make -C examples/06-lib-hello
          make -C examples/07-allreduce-tcp
          make -C examples/08-allreduce-verbs
          make -C examples/10-stress

      - name: clean
        run: |
          make -C lib clean
          for d in examples/01-tcp-echo examples/02-verbs-hello examples/05-rdma-write \
                   examples/06-lib-hello examples/07-allreduce-tcp examples/08-allreduce-verbs \
                   examples/10-stress; do
            make -C "$d" clean
          done

# CUDA-dependent examples (03, 04, 09, 14, 15, 16) and PyTorch-dependent
# examples (11, 12, 13) are not built in CI because the runner does not
# have nvcc or a configured PyTorch venv. They build locally.
